<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Africon Admin — Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0052CC 0%, #1a7a3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .brand { text-align: center; margin-bottom: 30px; }
    .brand-name { font-size: 28px; font-weight: bold; color: #0052CC; letter-spacing: 2px; }
    .brand-sub { font-size: 13px; color: #6FCF97; letter-spacing: 1px; margin-top: 4px; }
    .brand-label { font-size: 14px; color: #666; margin-top: 10px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #0052CC; box-shadow: 0 0 0 3px rgba(0,82,204,0.1); }
    .btn {
      width: 100%; padding: 12px;
      background: #0052CC; color: white;
      border: none; border-radius: 6px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #003d99; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .error { background: #fdecea; color: #c0392b; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-name">AFRICON</div>
      <div class="brand-sub">AI FOR GROWTH</div>
      <div class="brand-label">Admin Portal</div>
    </div>
    <div id="err" class="error"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Africon" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn" onclick="login()">Sign In</button>
  </div>

  <script>
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.style.display = 'none';

      if (!username || !password) { showErr('Enter username and password'); return; }

      btn.disabled = true; btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.error || 'Login failed'); return; }
        localStorage.setItem('token', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch (e) {
        showErr('Network error — try again');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('err');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
